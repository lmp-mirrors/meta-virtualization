# Legacy PC hardware emulated by Hyper-V Generation 1 VMs (and QEMU pcbios).
#
# When Xen runs as a guest of Hyper-V, dom0 is a Xen PV guest and only sees
# Xen -- it cannot drive Hyper-V's synthetic (VMBus) storage/network. Gen 1
# VMs instead emulate real PC devices, which dom0 drives with these standard
# in-tree drivers. Harmless on other targets (QEMU pcbios uses the same).

# Emulated Intel PIIX IDE controller -- Gen 1 boot disk (appears as /dev/sda).
CONFIG_ATA=y
CONFIG_ATA_PIIX=y
CONFIG_BLK_DEV_SD=y

# Hyper-V Gen 1 "Legacy Network Adapter" emulates a DEC 21140 (Tulip).
CONFIG_NET_VENDOR_DEC=y
CONFIG_NET_TULIP=y
CONFIG_TULIP=y
# Fallbacks: DE2104X covers other DECchip Tulip variants; PCNET32 is the
# AMD PCnet emulated NIC. (The old de4x5 driver was removed from mainline.)
CONFIG_DE2104X=y
CONFIG_PCNET32=y

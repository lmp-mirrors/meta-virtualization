# dnsmasq DHCP + DNS for Xen DomU guests on xenbr0 (XEN_DOM0_NETWORK = "nat").
#
# DomUs boot with ip=dhcp and attach to xenbr0; this serves them addresses in
# 10.0.100.0/24 with dom0 (10.0.100.1) as gateway and DNS.  DomU outbound is
# masqueraded out the uplink by systemd-networkd (see nat-xenbr0.network).
#
# bind-dynamic (not bind-interfaces) so dnsmasq copes with xenbr0 appearing
# after it starts and with vifs coming and going as DomUs launch/stop.

interface=xenbr0
bind-dynamic
except-interface=lo

# Serve DHCP on the xenbr0 subnet.
dhcp-range=10.0.100.50,10.0.100.200,12h
dhcp-option=option:router,10.0.100.1
dhcp-option=option:dns-server,10.0.100.1

# Act as a DNS forwarder for the guests (uses dom0's upstream resolvers).
domain-needed
bogus-priv

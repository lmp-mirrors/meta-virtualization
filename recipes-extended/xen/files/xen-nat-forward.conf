# Enable IPv4 forwarding so dom0 can route and masquerade DomU guest traffic
# out the uplink (XEN_DOM0_NETWORK = "nat").  systemd-networkd's IPMasquerade=
# / IPForward= do not reliably set the global sysctl across systemd versions
# (IPForward= is deprecated as of systemd 256), so set it explicitly here.
net.ipv4.ip_forward = 1
